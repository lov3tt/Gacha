# nginx/render.conf — single-container Nginx config for Render.
# Render assigns a dynamic PORT via environment variable.
# We use the PORT env var so Nginx listens on whatever Render assigns.

server {
    # Listen on the PORT environment variable — Render sets this dynamically.
    # The default_server flag makes this the catch-all server block.
    listen ${PORT} default_server;
    root /var/www/html;
    index index.html;

    # ── API routes → PHP-FPM ─────────────────────────────────────
    location /api/ {
        root /var/www;
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Angular static files ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
