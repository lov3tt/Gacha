# nginx/default.conf — tells Nginx how to handle incoming HTTP requests
# Nginx itself CANNOT execute PHP. It either serves static files directly,
# or hands .php requests off to the "app" container (PHP-FPM) over FastCGI.

server {
    # Listen for HTTP traffic on container port 80.
    # docker-compose.yml maps this to host port 8080.
    listen 80;

    # Folder Nginx treats as the website root.
    # This matches the volume mount in docker-compose.yml: ./src -> /var/www/html
    root /var/www/html;

    # If a request doesn't specify a file, try these in order.
    index index.php index.html;

    # Handles every request path ("/", "/about", "/api/users", etc.)
    location / {
        # Try to serve the exact file requested ($uri).
        # If not found, try it as a directory ($uri/).
        # If still not found, fall back to index.php
        # (lets PHP-side routing/frameworks handle the URL instead of a 404).
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handles ONLY requests where the URL ends in ".php"
    location ~ \.php$ {
        # Forward ("pass") this request using the FastCGI protocol
        # to host "app" (the PHP-FPM container) on port 9000.
        # "app" resolves via Docker Compose's internal DNS —
        # it is NOT a real hostname on the internet.
        fastcgi_pass app:9000;

        # If the URL is just a directory (e.g. "/"), assume index.php.
        fastcgi_index index.php;

        # Load Nginx's standard FastCGI parameter definitions
        # (sets things like REQUEST_METHOD, QUERY_STRING, etc.)
        include fastcgi_params;

        # Tell PHP-FPM the absolute path of the script to execute.
        # $document_root = /var/www/html (set above)
        # $fastcgi_script_name = the requested path, e.g. /index.php
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
