# nginx/render.conf — single-container Nginx config for Render.
# Unlike local dev, there's no separate Angular container to proxy to.
# Angular is pre-built static files served directly by Nginx.
# PHP-FPM runs inside the same container on 127.0.0.1:9000.

server {
    listen 80;
    root /var/www/html;
    index index.html;

    # ── API routes → PHP-FPM ─────────────────────────────────────
    # Forwards /api/* requests to PHP-FPM running locally in this container.
    # 127.0.0.1 instead of "app" hostname — no Docker network needed,
    # both Nginx and PHP-FPM are in the same container.
    location /api/ {
        root /var/www;
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Angular static files ──────────────────────────────────────
    # Serves pre-built Angular files from /var/www/html/.
    # try_files falls back to index.html for Angular's client-side routing —
    # without this, refreshing any Angular route returns a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
