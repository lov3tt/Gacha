# nginx/default.conf — updated to handle three types of requests:
#   /api/*   → PHP-FPM (your gacha API endpoints)
#   /*       → Angular dev server (the frontend UI)

server {
    listen 80;

    # ── API routes → PHP ─────────────────────────────────────────
    # Any URL starting with /api/ goes to PHP-FPM.
    # e.g. /api/pull.php, /api/history.php, /api/stats.php
    location /api/ {
        # The actual PHP files live in /var/www/api/ inside the container
        # (mounted from your local api/ folder via docker-compose.yml)
        root /var/www;

        # Try to find the exact file, otherwise 404
        try_files $uri =404;

        # Forward .php files to PHP-FPM on the "app" container port 9000
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Everything else → Angular ────────────────────────────────
    # All non-API requests get proxied to Angular's dev server.
    # Angular handles its own routing internally (/, /pull, /history etc.)
    location / {
        # proxy_pass forwards the request to Angular's dev server
        # running on port 4200 inside the "frontend" container.
        # "frontend" resolves via Docker Compose's internal DNS.
        proxy_pass http://frontend:4200;

        # These headers are needed for Angular's live-reload (HMR)
        # to work over WebSocket — without them, auto-reload breaks.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
