<!-- frontend/src/app/components/pull/pull.component.html -->
<!-- Slot machine gacha UI -->

<!-- ── 5-star screen flash overlay ── -->
<!-- Sits above everything, fades in/out via CSS animation -->
<div class="flash-overlay" *ngIf="showFlash"></div>

<!-- ── Slot machine ── -->
<div class="slot-machine">

  <!-- Machine frame -->
  <div class="machine-header">🐱 Purrfect Slots 🐱</div>

  <!-- Three reels -->
  <div class="reels-container">

    <!-- Reel 1 — stops first -->
    <div class="reel" [ngClass]="{ 'reel-stopped': reel1Stopped, 'reel-spinning': isSpinning && !reel1Stopped }">
      <div class="reel-window">
        <!-- The symbol cycles via TypeScript, CSS controls the blur/animation -->
        <span class="reel-symbol">{{ reel1Symbol }}</span>
      </div>
    </div>

    <!-- Reel 2 — stops second -->
    <div class="reel" [ngClass]="{ 'reel-stopped': reel2Stopped, 'reel-spinning': isSpinning && !reel2Stopped }">
      <div class="reel-window">
        <span class="reel-symbol">{{ reel2Symbol }}</span>
      </div>
    </div>

    <!-- Reel 3 — stops last, shows rarity result symbol -->
    <div class="reel" [ngClass]="{ 'reel-stopped': reel3Stopped, 'reel-spinning': isSpinning && !reel3Stopped }">
      <div class="reel-window">
        <span class="reel-symbol">{{ reel3Symbol }}</span>
      </div>
    </div>

  </div>

  <!-- Decorative line across all reels (the "payline") -->
  <div class="payline"></div>

  <!-- Pull button -->
  <button
    class="pull-btn"
    (click)="pull()"
    [disabled]="isLoading || isSpinning">
    <span *ngIf="isLoading">Loading...</span>
    <span *ngIf="isSpinning && !isLoading">🎰 Spinning...</span>
    <span *ngIf="!isLoading && !isSpinning">Boop</span>
  </button>

</div>

<!-- ── Error message ── -->
<p class="error" *ngIf="error">{{ error }}</p>

<!-- ── Result card — fades in after reels stop ── -->
<!--
  [ngClass] applies 'revealed' class when isRevealed = true,
  which triggers the fade-in CSS animation.
  getRarityClass() adds rarity-3, rarity-4, or rarity-5 for border colour.
-->
<div class="result"
     *ngIf="pulledItem"
     [ngClass]="[getRarityClass(), isRevealed ? 'revealed' : 'hidden']">

  <p class="pity-msg" *ngIf="wasPity5">⚡ Hard pity triggered!</p>
  <p class="pity-msg" *ngIf="wasPity4">💜 4-star pity triggered!</p>

  <h2>{{ getStars(pulledItem.rarity) }}</h2>
  <h2>{{ pulledItem.name }}</h2>
 

</div>
