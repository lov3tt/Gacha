# docker-compose.yml — orchestration file: defines all 5 containers,
# how they're built, what ports they expose, and how they connect to
# each other. Docker Compose automatically creates a shared private
# network where each service can reach the others by name
# (e.g. "db", "app", "frontend") instead of an IP address.

services:

  # ── PHP application container ───────────────────────────────────
  app:
    build: .
    env_file:
      - .env
    # Mounts both src/ (existing PHP) and api/ (new JSON API endpoints)
    volumes:
      - ./src:/var/www/html
      - ./api:/var/www/api
    depends_on:
      - db

  # ── Angular frontend container ──────────────────────────────────
  frontend:
    # Builds from frontend/Dockerfile — runs Node.js + Angular CLI
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      # node_modules stays inside the container — avoids Windows path
      # issues with symlinks inside node_modules on a mounted volume
      - /app/node_modules
    # Angular dev server port — also accessible directly at localhost:4200
    ports:
      - "4200:4200"
    depends_on:
      - app

  # ── Web server container ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./api:/var/www/api
      # Updated config that routes /api/* to PHP and /* to Angular
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    # Needs both PHP and Angular running before it can route to them
    depends_on:
      - app
      - frontend

  # ── MySQL database container ────────────────────────────────────
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  # ── phpMyAdmin (database GUI) container ─────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:
