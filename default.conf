# nginx/default.conf
# Routes:
#   /api/* → PHP-FPM container (app:9000)
#   /*     → Angular dev server (frontend:4200)

server {
    listen 80;

    # ── API routes → PHP ─────────────────────────────────────────
    location /api/ {
        # Files live at /var/www/api/ inside the container
        root /var/www;
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Everything else → Angular dev server ─────────────────────
    location / {
        proxy_pass http://frontend:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Angular live reload websocket ────────────────────────────
    # Angular uses a websocket for hot module replacement (HMR) —
    # this makes file changes reload the browser automatically.
    location /ng-cli-ws {
        proxy_pass http://frontend:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }
}