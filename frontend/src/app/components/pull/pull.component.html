<!-- frontend/src/app/components/pull/pull.component.html -->

<!-- Pull button -->
<button class="pull-btn" (click)="pull()" [disabled]="isLoading">
  {{ isLoading ? 'Pulling...' : 'Pull x1' }}
</button>

<!-- Error message -->
<p class="error" *ngIf="error">{{ error }}</p>

<!-- Result card — stays visible between pulls, shows overlay while loading -->
<div class="result" *ngIf="pulledItem" [ngClass]="getRarityClass()">

  <!-- Loading overlay — dims the card while a new pull is in flight -->
  <!-- *ngIf="isLoading" shows it only while waiting for API response -->
  <div class="loading-overlay" *ngIf="isLoading">
    <span>✨ Pulling...</span>
  </div>

  <p class="pity-msg" *ngIf="wasPity5 && !isLoading">⚡ Hard pity triggered!</p>
  <p class="pity-msg" *ngIf="wasPity4 && !isLoading">💜 4-star pity triggered!</p>

  <h2>{{ getStars(pulledItem.rarity) }}</h2>
  <h2>{{ pulledItem.name }}</h2>
  <p>{{ pulledItem.rarity }}-star</p>

</div>
